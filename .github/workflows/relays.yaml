name: Sync Relay Directory

on:
  schedule:
    # Weekly on Sunday at 07:00 UTC
    - cron: "0 7 * * 0"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: relays
  cancel-in-progress: false

jobs:
  sync:
    name: Sync from upstream
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"

      - name: Fetch upstream relay list
        run: curl -fsSL https://raw.githubusercontent.com/permissionlesstech/georelays/main/nostr_relays.csv -o assets/data/relays.csv

      - name: Regenerate relay module
        run: node scripts/generate-relays.js

      - name: Commit and push
        run: |
          if git diff --quiet -- assets/data/relays.csv src/data/relays.ts; then
            echo "Relay directory already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/relays.csv src/data/relays.ts
          git commit -m "chore(relays): sync relay directory from upstream"
          git push
